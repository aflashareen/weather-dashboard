<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="weatherCard">
            <div class="weatherContent">
              <h1>Weather Dashboard</h1>
              <div class="forSearch">
                  <input class="search-input" type="text" placeholder="Enter city name" id="cityInput">
                  <button id="searchBtn">Search</button>
              </div>
            </div>
            <div class="currentWeather">
                <h3>Calicut</h3>
                <img src="images/rain.png" alt="">
                <p>25°C</p>
                <p>Partly Cloudy</p>
                <p>humidity: 60%</p>                               
            </div>
            <div class="forecast">
                <div class="forecastItem1">
                    <h3>Mon</h3>
                    <p><img src="images/clear.png" alt="">32°C</p>
                </div>
                <div class="forecastItem1">
                    <h3>Tue</h3>
                    <p><img src="images/rain.png" alt="">28°C</p>
                </div>  
                <div class="forecastItem1">
                    <h3>Wed</h3>
                    <p><img src="images/mist.png" alt="">30°C</p>
                </div>  
                <div class="forecastItem1">
                    <h3>Thu</h3>
                    <p><img src="images/clouds.png" alt="">27°C</p>
                </div>  
                <div class="forecastItem1">
                    <h3>Fri</h3>
                    <p><img src="images/clear.png" alt="">32°C</p>
                </div>  
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
